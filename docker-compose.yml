version: '3.8'

services:
  dispatcher:
    build: .
    dockerfile: Dockerfile.dispatcher
    container_name: delivery-dispatcher
    ports:
      - "5001:5001"
    volumes:
      - ./module_a_dispatcher.py:/app/module_a_dispatcher.py
      - ./database:/app/database
      - ./delivery.db:/app/delivery.db
    networks:
      - delivery-network
    restart: unless-stopped

  tracking:
    build: .
    dockerfile: Dockerfile.tracking
    container_name: delivery-tracking
    ports:
      - "5002:5002"
    volumes:
      - ./module_b_tracking.py:/app/module_b_tracking.py
      - ./database:/app/database
      - ./delivery.db:/app/delivery.db
    networks:
      - delivery-network
    restart: unless-stopped
    depends_on:
      - dispatcher

  notify:
    build: .
    dockerfile: Dockerfile.notify
    container_name: delivery-notify
    ports:
      - "5003:5003"
    volumes:
      - ./module_c_notify.py:/app/module_c_notify.py
      - ./database:/app/database
      - ./delivery.db:/app/delivery.db
    networks:
      - delivery-network
    restart: unless-stopped
    depends_on:
      - dispatcher
      - tracking

  frontend:
    image: nginx:alpine
    container_name: delivery-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - delivery-network
    restart: unless-stopped
    depends_on:
      - dispatcher
      - tracking
      - notify

networks:
  delivery-network:
    driver: bridge
