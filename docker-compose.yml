version: '3.8'

services:
  dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.dispatcher
    container_name: delivery-dispatcher
    ports:
      - "5001:5001"
    volumes:
      - sqlite_data:/app
    networks:
      - delivery-network

  tracking:
    build:
      context: .
      dockerfile: Dockerfile.tracking
    container_name: delivery-tracking
    ports:
      - "5002:5002"
    volumes:
      - sqlite_data:/app
    networks:
      - delivery-network

  notify:
    build:
      context: .
      dockerfile: Dockerfile.notify
    container_name: delivery-notify
    ports:
      - "5003:5003"
    volumes:
      - sqlite_data:/app
    networks:
      - delivery-network

  frontend:
    image: nginx:alpine
    container_name: delivery-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - dispatcher
      - tracking
      - notify
    networks:
      - delivery-network

volumes:
  sqlite_data:

networks:
  delivery-network:
    driver: bridge
