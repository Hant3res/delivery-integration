services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - delivery-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong!Passw0rd", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.dispatcher
    ports:
      - "5001:5001"
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - DATABASE_URL=mssql+pyodbc://sa:YourStrong!Passw0rd@mssql:1433/delivery_db?driver=ODBC+Driver+18+for+SQL+Server&trustservercertificate=yes
    networks:
      - delivery-network

  tracking:
    build:
      context: .
      dockerfile: Dockerfile.tracking
    ports:
      - "5002:5002"
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - DATABASE_URL=mssql+pyodbc://sa:YourStrong!Passw0rd@mssql:1433/delivery_db?driver=ODBC+Driver+18+for+SQL+Server&trustservercertificate=yes
    networks:
      - delivery-network

  notify:
    build:
      context: .
      dockerfile: Dockerfile.notify
    ports:
      - "5003:5003"
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - DATABASE_URL=mssql+pyodbc://sa:YourStrong!Passw0rd@mssql:1433/delivery_db?driver=ODBC+Driver+18+for+SQL+Server&trustservercertificate=yes
    networks:
      - delivery-network

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    depends_on:
      - dispatcher
      - tracking
      - notify
      - mssql
    networks:
      - delivery-network
    environment:
      - DATABASE_URL=mssql+pyodbc://sa:YourStrong!Passw0rd@mssql:1433/delivery_db?driver=ODBC+Driver+18+for+SQL+Server&trustservercertificate=yes

volumes:
  mssql_data:

networks:
  delivery-network:
    driver: bridge
