services:
  dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.dispatcher
    ports:
      - "5001:5001"
    networks:
      - delivery-network

  tracking:
    build:
      context: .
      dockerfile: Dockerfile.tracking
    ports:
      - "5002:5002"
    networks:
      - delivery-network

  notify:
    build:
      context: .
      dockerfile: Dockerfile.notify
    ports:
      - "5003:5003"
    networks:
      - delivery-network

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    depends_on:
      - dispatcher
      - tracking
      - notify
    networks:
      - delivery-network
    environment:
      - DISPATCHER_URL=http://dispatcher:5001
      - TRACKING_URL=http://tracking:5002
      - NOTIFY_URL=http://notify:5003

networks:
  delivery-network:
    driver: bridge
