name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install flask pytest
    
    - name: Check Python syntax
      run: |
        python -m py_compile module_a_dispatcher.py
        python -m py_compile module_b_tracking.py
        python -m py_compile module_c_notify.py
    
    - name: Run tests
      run: pytest tests/ -v
    
    - name: Check files exist
      run: ls -la
