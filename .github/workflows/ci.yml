name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install flask flask-cors sqlalchemy requests tenacity pytest
    
    - name: Run unit tests
      run: |
        python -m unittest discover tests/unit -v
    
    - name: Check Python syntax
      run: |
        python -m py_compile module_a_dispatcher.py
        python -m py_compile module_b_tracking.py
        python -m py_compile module_c_notify.py
        python -m py_compile state_machine.py
        python -m py_compile saga.py
        python -m py_compile resilience.py
        python -m py_compile logger_config.py
    
    - name: Start services
      run: |
        python module_a_dispatcher.py &
        python module_b_tracking.py &
        python module_c_notify.py &
        sleep 5
    
    - name: Run integration tests
      run: |
        python -m unittest discover tests/integration -v
    
    - name: Run E2E tests
      run: |
        python -m unittest discover tests/e2e -v
    
    - name: Stop services
      run: |
        pkill -f "python module_" || true
